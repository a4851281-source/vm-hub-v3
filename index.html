<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VM Hub - Prawdziwy Emulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        iframe { border: none; border-radius: 16px; background: #000; }
    </style>
</head>
<body class="bg-zinc-950 text-white">

<div class="max-w-7xl mx-auto p-8">
    <div class="flex items-center justify-between mb-10">
        <h1 class="text-5xl font-bold">VM Hub <span class="text-blue-500">- Prawdziwy Emulator</span></h1>
        <p class="text-zinc-400">Prezentacja • Maj 2026</p>
    </div>

    <div class="grid grid-cols-12 gap-8">
        <!-- Menu -->
        <div class="col-span-12 md:col-span-4 space-y-4">
            <h2 class="text-2xl font-semibold mb-6">Wybierz maszynę wirtualną</h2>
            
            <div onclick="loadVM(0)" class="group bg-zinc-900 hover:bg-zinc-800 p-6 rounded-3xl cursor-pointer transition-all border border-transparent hover:border-blue-500">
                <h3 class="text-xl font-bold">Ubuntu 22.04 Desktop</h3>
                <p class="text-emerald-400">Pełny graficzny Linux (v86)</p>
            </div>

            <div onclick="loadVM(1)" class="group bg-zinc-900 hover:bg-zinc-800 p-6 rounded-3xl cursor-pointer transition-all">
                <h3 class="text-xl font-bold">Windows 98</h3>
                <p class="text-amber-400">Klasyczny system (v86)</p>
            </div>

            <div onclick="loadVM(2)" class="group bg-zinc-900 hover:bg-zinc-800 p-6 rounded-3xl cursor-pointer transition-all">
                <h3 class="text-xl font-bold">Alpine Linux x86_64</h3>
                <p class="text-zinc-400">Nowoczesny Linux (JSLinux)</p>
            </div>
        </div>

        <!-- Emulator -->
        <div class="col-span-12 md:col-span-8">
            <div id="header" class="hidden mb-4 flex justify-between items-center">
                <h2 id="title" class="text-3xl font-bold"></h2>
                <button onclick="stopVM()" class="bg-red-600 px-8 py-3 rounded-2xl font-medium hover:bg-red-700">
                    <i class="fa-solid fa-power-off"></i> Wyłącz
                </button>
            </div>
            
            <iframe id="vm" width="100%" height="620" class="hidden"></iframe>
            
            <div id="start" class="bg-zinc-900 rounded-3xl p-24 text-center">
                <h2 class="text-4xl font-bold mb-6">Kliknij maszynę po lewej</h2>
                <p class="text-zinc-400 text-lg">Uruchomi się **prawdziwy emulator** w przeglądarce</p>
            </div>
        </div>
    </div>
</div>

<script>
function loadVM(n) {
    document.getElementById('start').classList.add('hidden');
    document.getElementById('vm').classList.remove('hidden');
    document.getElementById('header').classList.remove('hidden');

    const frame = document.getElementById('vm');
    const title = document.getElementById('title');

    if (n === 0) {
        title.textContent = "Ubuntu 22.04 Desktop";
        frame.src = "https://copy.sh/v86/?profile=ubuntu";
    } else if (n === 1) {
        title.textContent = "Windows 98";
        frame.src = "https://copy.sh/v86/?profile=win98";
    } else if (n === 2) {
        title.textContent = "Alpine Linux x86_64";
        frame.src = "https://bellard.org/jslinux/vm.html?url=alpine-x86_64.cfg";
    }
}

function stopVM() {
    const frame = document.getElementById('vm');
    frame.src = "";
    frame.classList.add('hidden');
    document.getElementById('header').classList.add('hidden');
    document.getElementById('start').classList.remove('hidden');
}
</script>

</body>
</html>
